*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#faf9f7;color:#1a1a1a;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:0 1rem 4rem}
.header{text-align:center;padding:2.5rem 0 1.75rem;border-bottom:1px solid #e8e4df}
.header .welcome{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#888;margin-bottom:0.5rem}
.header h1{font-family:Georgia,serif;font-size:34px;font-weight:400;font-style:italic;color:#1a1a1a;line-height:1.2}
.header .divider{width:36px;height:1px;background:#c8c0b8;margin:1rem auto 0.75rem}
.header .subtitle{font-size:13px;color:#888;line-height:1.5}
.search-wrap{padding:1.25rem 0 0.5rem}
.search-wrap input{width:100%;padding:12px 16px;font-size:15px;border:1px solid #ddd;border-radius:12px;background:#fff;color:#1a1a1a;outline:none;-webkit-appearance:none}
.search-wrap input:focus{border-color:#aaa}
.section-lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#aaa;margin:1.25rem 0 0.75rem}
.alpha-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:0.5rem}
.alpha-btn{background:#fff;border:1px solid #e0dbd4;border-radius:10px;padding:13px 4px;font-size:14px;font-weight:500;color:#1a1a1a;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.alpha-btn:active{background:#f0ede8}
.alpha-btn.has-guests{border-color:#bbb}
.alpha-btn.empty{color:#ccc;border-color:#eee}
.results-wrap{padding-top:0.5rem}
.letter-heading{font-family:Georgia,serif;font-size:30px;font-style:italic;font-weight:400;color:#1a1a1a;margin-bottom:0.9rem}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:#888;background:none;border:none;cursor:pointer;margin-bottom:1.1rem;padding:0;-webkit-tap-highlight-color:transparent}
.result-card{background:#fff;border:1px solid #ebe6e0;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.guest-name{font-size:15px;font-weight:500;color:#1a1a1a;line-height:1.3}
.table-pill{background:#f5f2ee;border:1px solid #e0dbd4;border-radius:20px;padding:5px 14px;font-size:13px;color:#555;white-space:nowrap;flex-shrink:0}
.table-pill strong{font-weight:600;color:#1a1a1a}
.empty-msg{text-align:center;color:#aaa;font-size:14px;padding:2.5rem 0}
.count-note{font-size:12px;color:#bbb;text-align:center;margin-top:0.5rem}
</style>

  </div>

    <div class="count-note" id="count-note"></div>

  <div id="view-search" style="display:none">

  </div>

  <div id="view-letter" style="display:none">
    <button class="back-btn" onclick="showHome()">← Back</button>
    <div class="letter-heading" id="letter-heading"></div>
    <div id="letter-results"></div>

</div>

function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1).toLowerCase():'';}
function fullName(g){return cap(g.first)+' '+cap(g.last);}
function byLetter(l){return GUESTS.filter(g=>g.first.charAt(0).toUpperCase()===l).sort((a,b)=>a.first.localeCompare(b.first)||a.last.localeCompare(b.last));}

function card(g){
  return `<div class="result-card"><span class="guest-name">${fullName(g)}</span><span class="table-pill">Table <strong>${g.table}</strong></span></div>`;
}

function renderAlpha(){
  const grid=document.getElementById('alpha-grid');
  grid.innerHTML='';
  for(let i=65;i<=90;i++){
    const l=String.fromCharCode(i);
    const has=byLetter(l).length>0;
    const btn=document.createElement('button');
    btn.className='alpha-btn'+(has?' has-guests':' empty');
    btn.textContent=l;
    if(has) btn.onclick=()=>showLetter(l);
    grid.appendChild(btn);
  }
  document.getElementById('count-note').textContent=GUESTS.length+' guests · Tables 4–30';
}

function showLetter(l){
  document.getElementById('view-home').style.display='none';
  document.getElementById('view-search').style.display='none';
  document.getElementById('view-letter').style.display='block';
  document.getElementById('letter-heading').textContent=l;
  const list=byLetter(l);
  document.getElementById('letter-results').innerHTML=list.length?list.map(card).join(''):'<div class="empty-msg">No guests found under this letter.</div>';
}

function showHome(){
  document.getElementById('view-home').style.display='block';
  document.getElementById('view-search').style.display='none';
  document.getElementById('view-letter').style.display='none';
  document.getElementById('search').value='';
}

function handleSearch(val){
  const q=val.trim().toLowerCase();
  if(!q){
    document.getElementById('view-home').style.display='block';
    document.getElementById('view-search').style.display='none';
    return;
  }
  document.getElementById('view-home').style.display='none';
  document.getElementById('view-search').style.display='block';
  const matches=GUESTS.filter(g=>
    g.first.toLowerCase().includes(q)||g.last.toLowerCase().includes(q)
  ).sort((a,b)=>a.last.localeCompare(b.last));
  const sr=document.getElementById('search-results');
  sr.innerHTML=matches.length?matches.map(card).join(''):'<div class="empty-msg">No guests found for "'+val+'"</div>';
}

renderAlpha();
</script>
